name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Triggers on tags like v2.1.0, v3.0.0

permissions:
  contents: write     # Required to create GitHub Releases

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Install root npm dependencies (Electron, electron-builder)
      - name: Install Node dependencies
        run: npm ci

      # 5. Install frontend dependencies and build React app
      - name: Install & Build Frontend
        run: |
          npm install --prefix frontend
          npm run build --prefix frontend

      # 6. Build & Publish the Electron installer to GitHub Releases
      - name: Build & Publish Electron App
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --publish always
