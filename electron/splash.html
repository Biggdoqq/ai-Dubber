<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Dubber Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      height: 280px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    .card {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }

    .logo-wrap {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #e94560;
      border-right-color: #533483;
      animation: spin 1.2s linear infinite;
    }

    .logo-inner {
      position: absolute;
      inset: 8px;
      background: linear-gradient(135deg, #e94560, #533483);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-top: -14px;
    }

    .dots {
      display: flex;
      gap: 6px;
    }

    .dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #e94560;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; background: #8b5cf6; }
    .dots span:nth-child(3) { animation-delay: 0.4s; background: #533483; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1.1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-inner">🎬</div>
    </div>
    <div class="title">AI Video Dubber Pro</div>
    <div class="subtitle">Starting backend…</div>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</body>
</html>
